<html>
<head>
    <title>Contact Page</title>
    <link rel="stylesheet" href="portfolio.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header>
        <h1>Contact</h1>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-icon">&#9776;</label>
        <label for="menu-toggle" class="menu-overlay"></label>
        <nav>
            <a href="index.html" class="menu-item">Index</a>
            <a href="project.html" class="menu-item">Project</a>
            <a href="contact.html" class="menu-item">Contact</a>
            <a href="videoDemo.html" class="menu-item">Video Demo</a>
            <a href="sitereport.html" class="menu-item">Site Report</a>
        </nav>
    </header>

    <main>
                <section class="contact">
            <div class="contact-box">
                <h2>Contact Me</h2>

                <div class="contact-left">
                    <h2>You can find me at</h3>
                </div>

                
                <div class="contact-divider">
                    <span class="divider-line"></span>
                    <span class="divider-dot"></span>
                    <span class="divider-line"></span>
                </div>

                <div class="contact-right">
                    <form action="mailto:salon.20251087@nami.edu.np" method="get" enctype="text/plain" class="contact-form">
                        <div class="form-group">
                            <label for="full-name">Full Name</label>
                            <input type="text" id="full-name" name="full-name" placeholder="Your Name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="name@example.com">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" placeholder="Message..."></textarea>
                        </div>
                        <div class="form-button">
                            <button type="submit">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>
</body>
</html>
